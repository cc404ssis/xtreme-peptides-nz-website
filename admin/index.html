<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - XTREME PEPTIDES NZ</title>
  <link rel="stylesheet" href="/admin/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="screen">
      <div class="login-container">
        <div class="login-logo">
          <h1>XTREME PEPTIDES NZ</h1>
          <p>Admin Dashboard</p>
        </div>
        <form id="login-form" onsubmit="return false;">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Login</button>
          <div id="login-error" class="error-message"></div>
        </form>
      </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard-screen" class="screen hidden">
      <header class="header">
        <div class="header-left">
          <h1>XTREME PEPTIDES NZ - Admin</h1>
        </div>
        <div class="header-right">
          <span id="admin-username"></span>
          <button id="logout-btn" class="btn btn-secondary">Logout</button>
        </div>
      </header>

      <div class="main-content">
        <aside class="sidebar">
          <nav>
            <button class="nav-btn active" data-section="orders">
              📦 Orders
            </button>
            <button class="nav-btn" data-section="email-logs">
              📧 Email Logs
            </button>
          </nav>
        </aside>

        <main class="content">
          <!-- Orders Section -->
          <section id="orders-section" class="section">
            <div class="section-header">
              <h2>Orders</h2>
              <div class="filters">
                <select id="status-filter">
                  <option value="">All Statuses</option>
                  <option value="pending">Pending</option>
                  <option value="processing">Processing</option>
                  <option value="shipped">Shipped</option>
                  <option value="delivered">Delivered</option>
                  <option value="completed">Completed</option>
                  <option value="cancelled">Cancelled</option>
                </select>
                <input type="text" id="search-input" placeholder="Search orders...">
                <button id="refresh-btn" class="btn btn-secondary">🔄 Refresh</button>
              </div>
            </div>
            <div class="table-container">
              <table id="orders-table">
                <thead>
                  <tr>
                    <th>Order #</th>
                    <th>Date</th>
                    <th>Customer</th>
                    <th>Email</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="orders-tbody">
                  <!-- Orders will be loaded here -->
                </tbody>
              </table>
            </div>
          </section>

          <!-- Email Logs Section -->
          <section id="email-logs-section" class="section hidden">
            <div class="section-header">
              <h2>Email Logs</h2>
              <button id="refresh-logs-btn" class="btn btn-secondary">🔄 Refresh</button>
            </div>
            <div class="table-container">
              <table id="email-logs-table">
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Order #</th>
                    <th>Recipient</th>
                    <th>Type</th>
                    <th>Subject</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="email-logs-tbody">
                  <!-- Email logs will be loaded here -->
                </tbody>
              </table>
            </div>
          </section>
        </main>
      </div>
    </div>

    <!-- Order Detail Modal -->
    <div id="order-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Order Details</h2>
          <button class="close-btn">&times;</button>
        </div>
        <div class="modal-body" id="order-modal-body">
          <!-- Order details will be loaded here -->
        </div>
        <div class="modal-footer">
          <button id="send-status-email-btn" class="btn btn-primary">Send Status Email</button>
          <button id="send-custom-email-btn" class="btn btn-secondary">Send Custom Message</button>
        </div>
      </div>
    </div>

    <!-- Send Email Modal -->
    <div id="email-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="email-modal-title">Send Email</h2>
          <button class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <form id="email-form">
            <input type="hidden" id="email-order-number">
            <input type="hidden" id="email-recipient">
            
            <!-- Email Type Selector -->
            <div class="form-group">
              <label>Email Type *</label>
              <select id="email-type" required>
                <option value="">Select email type...</option>
                <option value="payment_confirmed">💳 Payment Confirmed</option>
                <option value="order_shipped">🚚 Order Shipped</option>
                <option value="order_delivered">✅ Order Delivered</option>
                <option value="order_cancelled">❌ Order Cancelled</option>
                <option value="order_refunded">💰 Order Refunded</option>
                <option value="order_delayed">⏳ Order Delayed</option>
                <option value="custom">✏️ Custom Message</option>
              </select>
            </div>

            <!-- Status Update (shown for most types) -->
            <div class="form-group" id="status-group">
              <label>Update Order Status</label>
              <select id="email-status">
                <option value="">No status change</option>
                <option value="pending">Pending</option>
                <option value="processing">Processing</option>
                <option value="shipped">Shipped</option>
                <option value="delivered">Delivered</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
                <option value="refunded">Refunded</option>
              </select>
            </div>

            <!-- Tracking Number (only for shipped) -->
            <div class="form-group hidden" id="tracking-group">
              <label>Tracking Number *</label>
              <input type="text" id="email-tracking" placeholder="Enter tracking number (required for shipped orders)">
            </div>

            <!-- Delay Reason (only for delayed) -->
            <div class="form-group hidden" id="delay-reason-group">
              <label>Delay Reason</label>
              <select id="delay-reason">
                <option value="high_demand">High Demand</option>
                <option value="shipping_delay">Shipping Carrier Delay</option>
                <option value="out_of_stock">Temporary Stock Shortage</option>
                <option value="weather">Weather Conditions</option>
                <option value="other">Other</option>
              </select>
            </div>

            <!-- Custom Message (only for custom) -->
            <div class="form-group hidden" id="custom-message-group">
              <label>Custom Message *</label>
              <textarea id="email-message" rows="5" placeholder="Enter your custom message..."></textarea>
            </div>

            <!-- Preview of email content -->
            <div class="form-group" id="email-preview-group">
              <label>Email Preview</label>
              <div id="email-preview" class="email-preview-box" style="background: #1a2a3a; padding: 15px; border-radius: 8px; border-left: 3px solid #00d4ff; font-size: 13px; line-height: 1.6; max-height: 200px; overflow-y: auto;">
                <em style="color: #8b9cb5;">Select an email type to see preview...</em>
              </div>
            </div>

            <div id="email-error" class="error-message"></div>
            <div id="email-success" class="success-message"></div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary close-modal">Cancel</button>
          <button type="submit" form="email-form" class="btn btn-primary">Send Email</button>
        </div>
      </div>
    </div>
  </div>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script src="/admin/admin.js?v=7"></script>
</body>
</html>
